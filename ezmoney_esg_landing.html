<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統一投信 員工永續活動</title>
<style>
/* =====================================================================
   樣式（版面設計）— 一般維護不需要改這一區
   配色與視覺取自「主視覺.svg / 底圖.svg」品牌
   ===================================================================== */
:root{
  --paper:#FBFDF8; --paper-2:#EFF7EC; --card:#ffffff;
  --ink:#16301A; --ink-soft:#3f5446; --muted:#5a6d60;
  --deep:#1C5E22; --green:#2E8B4E; --green2:#33925C; --teal:#43AE86;
  --lime:#8BDB7D; --mint:#A6F4AE; --sky:#B2F0F9;
  --gold:#E89B00; --gold2:#F2B200; --gold-ink:#3c2900;
  --line:#DBEBDC;
  --bg-grad:linear-gradient(150deg,#B2F0F9 0%,#A6F4AE 55%,#8BDB7D 100%);
  --r-sm:12px; --r:18px; --r-lg:26px; --pill:999px;
  --sh1:0 2px 10px rgba(24,80,32,.06);
  --sh2:0 12px 30px rgba(24,80,32,.10);
  --shlift:0 20px 44px rgba(24,80,32,.16);
  --font:"微軟正黑體","Microsoft JhengHei","Noto Sans TC","PingFang TC","Heiti TC",sans-serif;
  --maxw:1080px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--ink-soft);background:var(--paper);
  line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block}
.num{font-variant-numeric:tabular-nums;letter-spacing:.01em}
a{color:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:800;
  color:var(--green);letter-spacing:.08em;text-transform:none}
.eyebrow svg{width:17px;height:17px}
h1,h2,h3{color:var(--ink);line-height:1.2}
.sec-title{font-size:clamp(23px,3.4vw,31px);font-weight:800;margin:8px 0 4px;letter-spacing:-.01em}
.sec-sub{color:var(--muted);margin:0 0 26px;font-size:15.5px}
svg.ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== sticky header ===== */
.nav{position:sticky;top:0;z-index:50;background:rgba(251,253,248,.82);backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line)}
.nav .in{max-width:var(--maxw);margin:0 auto;padding:10px 22px;display:flex;align-items:center;gap:16px}
.nav .brand{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--deep);font-size:15px;text-decoration:none}
.nav .brand img{height:34px;width:auto}
.nav .links{margin-left:auto;display:flex;gap:4px}
.nav .links a{padding:8px 14px;border-radius:var(--pill);font-size:14.5px;font-weight:700;color:var(--ink-soft);
  text-decoration:none;transition:background .18s,color .18s}
.nav .links a:hover{background:var(--paper-2);color:var(--deep)}
.nav .join{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--gold-ink);
  font-weight:800;font-size:14.5px;padding:9px 18px;border-radius:var(--pill);text-decoration:none;
  box-shadow:0 4px 0 rgba(180,120,0,.32);transition:transform .12s,box-shadow .12s;white-space:nowrap}
.nav .join:hover{transform:translateY(-1px)}
.nav .join:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(180,120,0,.32)}
@media(max-width:760px){.nav .links{display:none}.nav .in{gap:10px}}

/* ===== hero ===== */
.hero{position:relative;background:var(--bg-grad);overflow:hidden;min-height:520px;display:flex;align-items:center}
.hero .hero-bg{position:absolute;right:-4%;bottom:0;height:104%;width:auto;max-width:58%;object-fit:contain;
  object-position:bottom right;z-index:0;pointer-events:none}
.hero::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(100deg,rgba(178,240,249,.55) 0%,rgba(166,244,174,.30) 42%,rgba(139,219,125,0) 66%)}
.hero .in{max-width:var(--maxw);margin:0 auto;padding:64px 22px;position:relative;z-index:2;width:100%}
.hero .copy{max-width:min(600px,60%)}
.hero .eyebrow{color:var(--deep)}
.hero h1{font-size:clamp(38px,6vw,60px);font-weight:800;letter-spacing:-.02em;margin:12px 0 16px;color:#123c17}
.hero h1 .hl{color:var(--deep);position:relative;white-space:nowrap}
.hero h1 .hl::after{content:"";position:absolute;left:-2px;right:-2px;bottom:6px;height:14px;
  background:var(--gold2);opacity:.55;border-radius:6px;z-index:-1}
.hero p.sub{font-size:18px;color:#1e422a;margin:0 0 22px;max-width:34ch}
.hero .period{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.72);
  color:var(--deep);font-weight:800;font-size:14.5px;padding:8px 16px;border-radius:var(--pill);margin-bottom:24px}
.hero .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--gold-ink);
  font-weight:800;font-size:16.5px;padding:14px 28px;border-radius:var(--pill);text-decoration:none;
  box-shadow:0 6px 0 rgba(180,120,0,.34);transition:transform .12s,box-shadow .12s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 0 rgba(180,120,0,.34)}
.btn-primary:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(180,120,0,.34)}
@media(max-width:820px){
  .hero{min-height:auto}
  .hero .in{padding:44px 22px 52px;text-align:center}
  .hero .copy{max-width:100%}
  .hero p.sub{margin-left:auto;margin-right:auto}
  .hero .actions{justify-content:center}
  .hero .eyebrow{justify-content:center;width:100%}
  .hero .hero-bg{position:relative;right:auto;height:auto;width:82%;max-width:340px;margin:22px auto -8px;display:block}
  .hero::after{display:none}
}

/* ===== generic section ===== */
.section{position:relative;padding:64px 0;scroll-margin-top:72px}
.section.alt{background:var(--paper-2)}
.section .head{margin-bottom:4px}

/* ===== steps ===== */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px}
@media(max-width:820px){.steps{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.steps{grid-template-columns:1fr}}
.step{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
  box-shadow:var(--sh1);transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.step:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.step .media{position:relative;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:color-mix(in srgb,var(--mint) 32%,#fff)}
.step .media img{width:100%;height:100%;object-fit:contain}
.step .media.ph{background:repeating-linear-gradient(45deg,#EFF7EC,#EFF7EC 11px,#E7F3E4 11px,#E7F3E4 22px);
  border-bottom:1px dashed var(--line)}
.step .media.ph::after{content:"操作示意圖";color:var(--teal);font-size:13px;font-weight:800;letter-spacing:.05em;opacity:.75}
.step .media .idx{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.9);color:var(--deep);
  font-weight:800;font-size:13px;letter-spacing:.06em;padding:4px 11px;border-radius:var(--pill);box-shadow:var(--sh1)}
.step .sbody{padding:16px 18px 18px}
.step .sbody h3{font-size:17px;font-weight:800;margin:0 0 5px;color:var(--ink)}
.step .sbody p{margin:0;font-size:14.5px;color:var(--muted);line-height:1.6}

/* ===== activities accordion ===== */
.acts{margin-top:22px;display:flex;flex-direction:column;gap:16px}
.act{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--sh1);transition:box-shadow .2s,transform .2s;border-top:5px solid var(--acc,#2E8B4E);scroll-margin-top:84px}
.act:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.act[open]{box-shadow:var(--sh2)}
.act>summary{list-style:none;cursor:pointer;display:block;padding:0}
.act>summary::-webkit-details-marker{display:none}
.act>summary:focus-visible{outline:3px solid var(--gold);outline-offset:-3px}
.act .banner{position:relative;width:100%;height:158px;overflow:hidden;
  background:color-mix(in srgb,var(--acc) 13%,#fff)}
.act .banner img{width:100%;height:100%;object-fit:contain;padding:14px 20px}
.act .banner .rb{position:absolute;top:12px;right:14px;display:inline-flex;align-items:center;gap:5px;
  font-size:14px;font-weight:800;color:var(--gold-ink);background:rgba(255,255,255,.92);padding:5px 12px;border-radius:var(--pill);box-shadow:var(--sh1)}
.act .banner .rb b{color:var(--gold)}
@media(max-width:520px){.act .banner{height:132px}}
.act .bar{display:flex;align-items:center;gap:14px;padding:15px 20px}
.act .head2{flex:1;min-width:0}
.act .row1{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.act .row1 h3{font-size:18.5px;font-weight:800;margin:0}
.tag{font-size:12px;font-weight:800;padding:3px 11px;border-radius:var(--pill);
  background:color-mix(in srgb,var(--acc) 18%,#fff);color:var(--acc)}
.tag.limit{background:#FDF3D0;color:#946b00}
.reward{display:inline-flex;align-items:center;gap:5px;font-size:15px;font-weight:800;color:var(--gold-ink);
  background:#FFF3D6;padding:3px 11px;border-radius:var(--pill)}
.reward b{color:var(--gold)}
.act .oneliner{font-size:14.5px;color:var(--muted);margin-top:3px}
.act .chev{flex:none;color:var(--acc);transition:transform .22s}
.act[open] .chev{transform:rotate(180deg)}
.act .body{padding:0 20px 22px 20px}
.act .divider{height:1px;background:var(--line);margin:2px 0 14px}
.field{margin-top:14px}
.field .lab{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--green);margin-bottom:3px}
.field .lab svg{width:15px;height:15px}
.field .val{font-size:15px;color:var(--ink-soft)}
.tip{display:flex;gap:10px;align-items:flex-start;background:#FFF8E3;border:1px solid #F6E4AE;
  border-radius:14px;padding:12px 14px;color:#6f5600;font-size:14.5px;margin-top:14px}
.tip svg{width:19px;height:19px;flex:none;margin-top:2px;stroke:#C6890B}
.qa{margin-top:6px}
.qa .item{padding:11px 0;border-top:1px solid var(--line)}
.qa .item:first-child{border-top:none}
.qa .q{font-weight:800;font-size:14.5px;color:var(--ink);display:flex;gap:7px}
.qa .q span{color:var(--acc);font-weight:800}
.qa .a{font-size:14.5px;color:var(--muted);margin-top:3px;padding-left:18px}

/* ===== faq ===== */
.faq{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh1)}
.faq details{border-top:1px solid var(--line)}
.faq details:first-child{border-top:none}
.faq summary{list-style:none;cursor:pointer;padding:17px 20px;font-weight:800;color:var(--ink);font-size:15.5px;
  display:flex;align-items:center;gap:10px}
.faq summary::-webkit-details-marker{display:none}
.faq summary .chev{margin-left:auto;color:var(--green);transition:transform .22s}
.faq details[open] summary .chev{transform:rotate(180deg)}
.faq summary:focus-visible{outline:3px solid var(--gold);outline-offset:-3px}
.faq .a{padding:0 20px 18px 20px;color:var(--muted);font-size:14.5px}

/* ===== footer ===== */
footer{background:linear-gradient(160deg,#1C5E22,#124017);color:#cfe8d2;padding:40px 22px 34px;text-align:center}
footer .fbrand{font-weight:800;color:#fff;font-size:17px;margin-bottom:6px}
footer .meta{font-size:13.5px;opacity:.9}
footer .rule{width:44px;height:4px;background:var(--gold2);border-radius:4px;margin:0 auto 18px}
footer .tiny{margin-top:14px;font-size:12px;opacity:.6}

/* ===== about / background ===== */
.about-lead{max-width:64ch;font-size:16.5px;color:var(--ink-soft);margin:0 0 8px}
.about-aud{display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:700;color:var(--deep);
  background:color-mix(in srgb,var(--mint) 45%,#fff);border:1px solid var(--line);padding:8px 15px;border-radius:var(--pill);margin-top:6px}
.about-aud svg{width:16px;height:16px}
.flow-title{font-size:14px;font-weight:800;color:var(--green);margin:28px 0 12px;display:inline-flex;align-items:center;gap:7px}
.flow-title svg{width:16px;height:16px}
.flow{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap}
.flow .node{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px 16px;box-shadow:var(--sh1)}
.flow .node .k{width:34px;height:34px;border-radius:10px;background:var(--bg-grad);color:#0f3a17;font-weight:800;
  font-size:16px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.flow .node h4{margin:0 0 3px;font-size:15.5px;font-weight:800;color:var(--ink)}
.flow .node p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.55}
.flow .sep{display:flex;align-items:center;color:var(--teal)}
.flow .sep svg{width:22px;height:22px}
@media(max-width:720px){.flow{flex-direction:column}.flow .sep{transform:rotate(90deg);justify-content:center;padding:2px 0}}

/* reveal + a11y */
.js .reveal{opacity:0;transform:translateY(18px);transition:opacity .55s ease-out,transform .55s ease-out}
.js .reveal.in{opacity:1;transform:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *{transition:none!important;animation:none!important}
  .reveal{opacity:1;transform:none}
}
</style>
</head>

<section class="section alt" id="about">
  <div class="wrap">
    <div class="head reveal">
      <span class="eyebrow"><svg class="ic"><use href="#i-leaf"/></svg>關於活動</span>
      <h2 class="sec-title" id="aboutTitle"></h2>
      <p class="about-lead" id="aboutBg"></p>
      <div class="about-aud"><svg class="ic"><use href="#i-check"/></svg><span id="aboutAud"></span></div>
    </div>
    <div class="reveal">
      <div class="flow-title"><svg class="ic"><use href="#i-spark"/></svg>活動怎麼運作</div>
      <div class="flow" id="flow"></div>
    </div>
  </div>
</section>

<section class="section" id="activities">
  <div class="wrap">
    <div class="head reveal">
      <span class="eyebrow"><svg class="ic"><use href="#i-leaf"/></svg>活動介紹</span>
      <h2 class="sec-title">點開看每個活動怎麼玩</h2>
      <p class="sec-sub">每個活動都很好參加，拍一張照片就能完成。</p>
    </div>
    <div class="acts" id="actList"></div>
  </div>
</section>

<section class="section alt" id="faq">
  <div class="wrap">
    <div class="head reveal">
      <span class="eyebrow"><svg class="ic"><use href="#i-check"/></svg>常見問答</span>
      <h2 class="sec-title">關於參加與領獎</h2>
      <p class="sec-sub">還有疑問？這裡先幫你解答。</p>
    </div>
    <div class="faq" id="faqList"></div>
  </div>
</section>

<section class="section" id="start">
  <div class="wrap">
    <div class="head reveal">
      <span class="eyebrow"><svg class="ic"><use href="#i-spark"/></svg>如何加入會員</span>
      <h2 class="sec-title">3 分鐘加入，開始拿獎勵</h2>
      <p class="sec-sub">還沒加入？照著這幾步做，就能開始參加活動。</p>
    </div>
    <div class="steps" id="steps"></div>
  </div>
</section>

<footer>
  <div class="rule"></div>
  <div class="fbrand">統一投信 員工永續活動</div>
  <div class="meta">活動期間 <span class="num" id="footPeriod"></span></div>
  <div class="meta" id="footContact" style="margin-top:4px"></div>
  <div class="tiny">STOCKFEEL × 統一投信</div>
</footer>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ACC=["#2E8B4E","#43AE86","#5FB63C","#1C5E22","#E89B00"]; // 每個活動的品牌強調色

$('#heroTitle').innerHTML = esc(DATA.heroTitleTop)+'<br><span class="hl">'+esc(DATA.heroTitleHL)+'</span>';
$('#heroSub').textContent = DATA.heroSub;
$('#period').textContent = DATA.activityPeriod;
$('#footPeriod').textContent = DATA.activityPeriod;
$('#footContact').textContent = DATA.contact;

/* about / background */
$('#aboutTitle').textContent = DATA.about.title;
$('#aboutBg').textContent = DATA.about.bg;
$('#aboutAud').textContent = DATA.about.audience;
$('#flow').innerHTML = DATA.about.how.map((h,i)=>{
  const node=`<div class="node"><div class="k num">${i+1}</div><h4>${esc(h[0])}</h4><p>${esc(h[1])}</p></div>`;
  const sep=i<DATA.about.how.length-1?`<div class="sep" aria-hidden="true"><svg class="ic"><use href="#i-arrow"/></svg></div>`:"";
  return node+sep;
}).join("");

$('#steps').innerHTML = DATA.joinSteps.map((s,i)=>{
  const no="STEP "+String(i+1).padStart(2,"0");
  const media = s.img
    ? `<div class="media"><img src="${esc(s.img)}" alt="步驟 ${i+1} 操作示意" onerror="this.parentElement.classList.add('ph');this.remove();"><span class="idx">${no}</span></div>`
    : `<div class="media ph"><span class="idx">${no}</span></div>`;
  return `<div class="step reveal" style="transition-delay:${i*40}ms">
    ${media}
    <div class="sbody"><h3>${esc(s.title)}</h3><p>${esc(s.desc)}</p></div>
  </div>`;
}).join("");

$('#actList').innerHTML = DATA.activities.map((a,i)=>{
  const acc=ACC[i%ACC.length];
  const qa=a.qa.map(([q,ans])=>`<div class="item"><div class="q"><span>Q</span>${esc(q)}</div><div class="a">${esc(ans)}</div></div>`).join("");
  return `<details class="act reveal" id="act-${esc(a.id)}" style="--acc:${acc}">
    <summary>
      <div class="banner">
        <img src="${esc(a.img)}" alt="" onerror="this.style.display='none'">
        <span class="rb"><svg class="ic" style="width:15px;height:15px;stroke:var(--gold)"><use href="#i-gift"/></svg>${esc(a.reward)}</span>
      </div>
      <div class="bar">
        <div class="head2">
          <div class="row1">
            <h3>${esc(a.name)}</h3>
            <span class="tag${a.tag==='限時'?' limit':''}">${esc(a.tag)}</span>
          </div>
          <div class="oneliner">${esc(a.oneliner)}</div>
        </div>
        <svg class="ic chev"><use href="#i-chev"/></svg>
      </div>
    </summary>
    <div class="body">
      <div class="divider"></div>
      <div class="field"><span class="lab"><svg class="ic"><use href="#i-leaf"/></svg>活動說明</span><div class="val">${esc(a.desc)}</div></div>
      <div class="field"><span class="lab"><svg class="ic"><use href="#i-spark"/></svg>參加規則</span><div class="val">${esc(a.rule)}</div></div>
      <div class="field"><span class="lab"><svg class="ic"><use href="#i-check"/></svg>照片怎麼拍</span><div class="val">${esc(a.photo)}</div></div>
      <div class="tip"><svg class="ic"><use href="#i-cam"/></svg><div><b>拍照小技巧：</b>${esc(a.tip)}</div></div>
      <div class="field"><span class="lab"><svg class="ic"><use href="#i-check"/></svg>常見問答</span><div class="qa">${qa}</div></div>
    </div>
  </details>`;
}).join("");

$('#faqList').innerHTML = DATA.commonQA.map(([q,a])=>`
  <details><summary>${esc(q)}<svg class="ic chev"><use href="#i-chev"/></svg></summary><div class="a">${esc(a)}</div></details>`).join("");

/* 頁內連結一律平滑捲動到下方對應區塊（不外連） */
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    const id=a.getAttribute('href');
    if(id.length>1){
      const t=document.querySelector(id);
      if(t){e.preventDefault();
        if(t.tagName==='DETAILS') t.open=true;
        const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
        t.scrollIntoView({behavior:reduce?'auto':'smooth',block:'start'});
        history.replaceState(null,'',id);}
    }
  });
});

/* 支援用網址直達特定活動卡片，例如 ...頁面#act-transport（transport / cup / walk4000 / walk8000 / bag）*/
function openFromHash(){
  const h=location.hash;
  if(h && h.indexOf('#act-')===0){
    const el=document.querySelector(h);
    if(el && el.tagName==='DETAILS'){
      el.open=true;
      setTimeout(()=>el.scrollIntoView({behavior:'auto',block:'start'}),80);
    }
  }
}
window.addEventListener('hashchange',openFromHash);
openFromHash();
const mq=window.matchMedia('(prefers-reduced-motion:reduce)');
const items=document.querySelectorAll('.reveal');
if(mq.matches||!('IntersectionObserver'in window)){items.forEach(el=>el.classList.add('in'));}
else{
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  items.forEach(el=>io.observe(el));
}
</script>
</body>
</html>
